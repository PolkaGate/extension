<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>polkagate</title>
    <link href="fonts/fonts.css" rel="stylesheet">
    <style type="text/css">
      body {
        height: 600px;
        margin: 0;
        overflow-x: hidden;
        text-align: center;
      }

      div#root {
        box-sizing: border-box;
        height: calc(100vh);
        margin: 0 auto;
        max-width: 100%;
        padding: 0;
        position: relative;
        text-align: left;
        width: 375px;
      }

      html.fullscreen-shell body {
        background: #D8DDF1;
      }

      html.fullscreen-shell div#root {
        background: #D8DDF1;
        margin: 0;
        max-width: 100%;
        width: 100%;
      }
    </style>
    <script src="./fullscreen-shell.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <div id="alert-root"></div>
    <script src='./extension.js'></script>
  </body>
</html>
